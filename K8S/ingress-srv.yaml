apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-srv
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: 'true'

spec:
  rules:
    - host: app.test
      http:
        paths:
          - path: /api/platforms
            pathType: Prefix
            backend:
              service:
                name: platforms-clusterip-serv
                port:
                  number: 8080
          
          - path: /api/c/platforms
            pathType: Prefix
            backend:
              service: 
                name: commands-clusterip-serv
                port:
                  number: 8080